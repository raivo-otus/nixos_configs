keys:
  # Your personal age key for editing secrets from any machine.
  # Generate with: age-keygen -o ~/.config/sops/age/keys.txt
  # Print public key with: age-keygen -y ~/.config/sops/age/keys.txt
  - &admin age1REPLACE_WITH_YOUR_ADMIN_AGE_PUBLIC_KEY

  # Grenth host key — derived from its SSH host key.
  # Get with: sudo ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
  - &grenth age1REPLACE_WITH_GRENTH_HOST_AGE_PUBLIC_KEY

  # lyssa host key — derived from its SSH host key.
  # Get with: sudo ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
  - &lyssa age1REPLACE_WITH_LYSSA_HOST_AGE_PUBLIC_KEY

creation_rules:
  - path_regex: secrets/grenth\.yaml$
    key_groups:
      - age:
          - *admin
          - *grenth

  - path_regex: secrets/lyssa\.yaml$
    key_groups:
      - age:
          - *admin
          - *lyssa
